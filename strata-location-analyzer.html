<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brilliant Corners — יועץ מיקום עירוני</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --bg:#0B0D10;
    --bg-glow:#161B24;
    --panel:#14171C;
    --panel-2:#1B1F26;
    --border:#262B33;
    --text:#EDEEF1;
    --text-dim:#8B92A0;
    --text-faint:#5B6270;
    --accent:#FFB020;
    --accent-2:#FF6B35;
    --weak:#E5484D;
    --mid:#F2A93B;
    --strong:#3ECF8E;
    --blue:#4C8DFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(60vw 40vh at 15% -10%, var(--bg-glow) 0%, transparent 60%),
      radial-gradient(50vw 40vh at 100% 0%, #201612 0%, transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    min-height:100vh;
  }
  .shell{max-width:960px;margin:0 auto;padding:56px 20px 90px;}
  .brand{text-align:center;margin-bottom:44px;}
  .brand .wordmark{
    font-family:"Segoe UI",Arial,sans-serif;
    font-weight:800;font-size:13px;letter-spacing:.22em;
    color:var(--accent);direction:ltr;display:inline-block;
    padding-bottom:10px;border-bottom:1px solid var(--border);
    max-width:90vw;
  }
  @media (max-width:420px){
    .brand .wordmark{font-size:11px;letter-spacing:.14em;}
  }
  .brand h1{font-size:26px;font-weight:700;margin:16px 0 6px;letter-spacing:-.01em;}
  .brand p{color:var(--text-dim);font-size:14.5px;margin:0;}

  .panel{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--border);
    border-radius:18px;
  }

  .input-panel{padding:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;}
  .field{display:flex;flex-direction:column;gap:6px;flex:1 1 260px;}
  .field label{font-size:12px;color:var(--text-dim);padding:0 2px;line-height:1;}
  .field input[type=text]{
    background:#0F1216;border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:13px 14px;font-size:15px;outline:none;
    transition:border-color .15s ease;
  }
  .field input[type=text]:focus{border-color:var(--accent);}
  .addr-field-wrap{position:relative;}
  .suggestions{
    position:absolute;top:calc(100% + 6px);right:0;left:0;z-index:20;
    background:#12151A;border:1px solid var(--border);border-radius:12px;
    box-shadow:0 16px 40px -12px rgba(0,0,0,.6);overflow:hidden;
    max-height:260px;overflow-y:auto;
  }
  .suggestion-item{
    display:flex;align-items:center;gap:10px;padding:11px 14px;
    font-size:13.5px;color:var(--text-dim);cursor:pointer;
    border-bottom:1px solid var(--border);
  }
  .suggestion-item:last-child{border-bottom:none;}
  .suggestion-item svg{flex:0 0 auto;color:var(--accent);}
  .suggestion-item span{
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .suggestion-item.active,.suggestion-item:hover{background:var(--panel-2);color:var(--text);}
  .suggestion-empty{padding:12px 14px;font-size:13px;color:var(--text-faint);}
  .select-wrap{flex:0 1 200px;}
  .select-box{position:relative;}
  .select-box select{
    appearance:none;-webkit-appearance:none;width:100%;
    background:#0F1216;border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:13px 34px 13px 14px;font-size:15px;outline:none;
    cursor:pointer;transition:border-color .15s ease;
  }
  .select-box select:focus{border-color:var(--accent);}
  .select-box::after{
    content:"";position:absolute;left:14px;top:50%;transform:translateY(-50%) rotate(45deg);
    width:7px;height:7px;border-right:2px solid var(--text-dim);border-bottom:2px solid var(--text-dim);
    pointer-events:none;
  }
  .btn-field{flex:0 0 auto;}
  .btn-field label{visibility:hidden;}
  .analyze-btn{
    flex:0 0 auto;border:none;cursor:pointer;border-radius:10px;
    padding:13px 26px;font-size:15px;font-weight:700;color:#1A1206;line-height:1.2;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 8px 24px -8px rgba(255,140,20,.55);
    transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease;
    min-width:150px;white-space:nowrap;
  }
  .analyze-btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px -8px rgba(255,140,20,.7);}
  .analyze-btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none;}
  @media (max-width:640px){
    .input-panel{flex-direction:column;flex-wrap:nowrap;}
    .field,.select-wrap,.btn-field{flex:1 1 auto;width:100%;}
    .analyze-btn{width:100%;}
  }

  .error-box{
    margin-top:16px;padding:14px 16px;border-radius:12px;
    background:rgba(229,72,77,.09);border:1px solid rgba(229,72,77,.35);
    color:#FF9A9D;font-size:14px;line-height:1.6;
  }

  .stage{
    margin-top:18px;text-align:center;color:var(--text-dim);font-size:13.5px;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .spinner{
    width:16px;height:16px;border-radius:50%;
    border:2px solid var(--border);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .results{margin-top:44px;animation:rise .5s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .score-section{display:flex;flex-direction:column;align-items:center;padding:36px 20px 8px;}
  .gauge-wrap{position:relative;width:240px;height:240px;}
  .gauge-center{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .gauge-center .num{font-size:56px;font-weight:800;line-height:1;letter-spacing:-.02em;direction:ltr;}
  .gauge-center .lvl{margin-top:8px;font-size:13px;font-weight:700;letter-spacing:.08em;}
  .gauge-center .sub{margin-top:2px;font-size:11.5px;color:var(--text-faint);}
  .addr-line{
    margin-top:18px;color:var(--text-dim);font-size:13.5px;text-align:center;max-width:520px;
  }
  .addr-line b{color:var(--text);font-weight:600;}

  .summary-box{
    margin:28px auto 0;max-width:640px;padding:18px 22px;border-radius:14px;
    background:rgba(255,176,32,.07);border:1px solid rgba(255,176,32,.28);
    font-size:15px;line-height:1.75;text-align:center;color:#F4E3C0;
  }
  .breakdown-toggle{
    margin:14px auto 0;display:block;background:none;border:none;cursor:pointer;
    color:var(--text-dim);font-size:12.5px;text-decoration:underline;text-underline-offset:3px;
    padding:4px 8px;
  }
  .breakdown-toggle:hover{color:var(--accent);}
  .breakdown-panel{
    margin:14px auto 0;max-width:640px;padding:16px 20px;border-radius:12px;
    background:var(--panel-2);border:1px solid var(--border);text-align:right;
  }
  .breakdown-row{font-size:12.5px;color:var(--text-dim);line-height:1.9;}
  .breakdown-row b{color:var(--text);font-weight:600;}

  .factors{display:flex;flex-wrap:wrap;gap:14px;margin-top:32px;padding:0 4px;}
  .factors > .factor-card{flex:1 1 230px;}
  @media (max-width:720px){.factors > .factor-card{flex-basis:100%;}}

  .time-dots{display:flex;justify-content:space-between;gap:8px;margin-bottom:12px;padding:4px 2px;}
  .time-dot-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
  .time-dot{width:16px;height:16px;border-radius:50%;transition:all .4s ease;}
  .time-dot-label{font-size:10.5px;color:var(--text-faint);}

  .tag-card{display:flex;flex-direction:column;}
  .tag-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .tag-chip{
    display:inline-block;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:600;
    background:rgba(255,176,32,.12);border:1px solid rgba(255,176,32,.35);color:var(--accent);
  }
  .factor-card{padding:20px;}
  .factor-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .factor-icon{
    width:38px;height:38px;border-radius:10px;background:var(--panel-2);
    display:flex;align-items:center;justify-content:center;color:var(--accent);
    border:1px solid var(--border);
  }
  .factor-score{font-size:22px;font-weight:800;direction:ltr;}
  .factor-title{font-size:13.5px;font-weight:700;margin-bottom:8px;}
  .factor-bar{height:6px;border-radius:4px;background:var(--panel-2);overflow:hidden;margin-bottom:12px;}
  .factor-bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.16,1,.3,1);}
  .factor-text{font-size:13px;color:var(--text-dim);line-height:1.6;}

  .map-panel{margin-top:20px;overflow:hidden;padding:0;}
  .map-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid var(--border);
  }
  .map-head h3{margin:0;font-size:14px;font-weight:700;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--text-dim);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .sq{width:9px;height:9px;border-radius:2px;display:inline-block;}
  #map{height:380px;width:100%;background:#10131a;direction:ltr;}

  .empty-hint{
    margin-top:18px;text-align:center;color:var(--text-faint);font-size:13px;
  }
  .footer-note{text-align:center;color:var(--text-faint);font-size:11.5px;margin-top:40px;line-height:1.7;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
(function(){
  var h = React.createElement;

  // ---------- config ----------
  var BUSINESS_GROUPS = [
    { label:'אוכל ומשקאות', items:[
      { value:'cafe',       label:'בית קפה',            osmKey:'amenity', osmValue:'cafe',       peak:['morning','afternoon'] },
      { value:'restaurant', label:'מסעדה',               osmKey:'amenity', osmValue:'restaurant', peak:['afternoon','evening'] },
      { value:'fast_food',  label:'מזון מהיר',           osmKey:'amenity', osmValue:'fast_food',  peak:['afternoon','evening'] },
      { value:'bakery',     label:'מאפייה',              osmKey:'shop',    osmValue:'bakery',     peak:['morning'] },
      { value:'ice_cream',  label:'גלידריה',             osmKey:'amenity', osmValue:'ice_cream',  peak:['afternoon','evening'] },
      { value:'bar',        label:'בר / פאב',            osmKey:'amenity', osmValue:'bar',        peak:['evening'] }
    ]},
    { label:'קמעונאות יומיומית', items:[
      { value:'supermarket', label:'סופרמרקט',           osmKey:'shop', osmValue:'supermarket', peak:['morning','afternoon','evening'] },
      { value:'convenience', label:'מכולת / מינימרקט',   osmKey:'shop', osmValue:'convenience',  peak:['morning','afternoon','evening'] },
      { value:'pharmacy',    label:'בית מרקחת',           osmKey:'amenity', osmValue:'pharmacy',  peak:['morning','afternoon'] },
      { value:'florist',     label:'חנות פרחים',          osmKey:'shop', osmValue:'florist',      peak:['afternoon'] }
    ]},
    { label:'אופנה ועיצוב הבית', items:[
      { value:'clothing',  label:'חנות בגדים',          osmKey:'shop', osmValue:'clothes',   peak:['afternoon','evening'] },
      { value:'shoes',     label:'חנות נעליים',         osmKey:'shop', osmValue:'shoes',      peak:['afternoon','evening'] },
      { value:'jewelry',   label:'תכשיטים ואקססוריז',   osmKey:'shop', osmValue:'jewelry',    peak:['afternoon','evening'] },
      { value:'furniture', label:'רהיטים ועיצוב',       osmKey:'shop', osmValue:'furniture',  peak:['afternoon'] }
    ]},
    { label:'טיפוח ויופי', items:[
      { value:'hairdresser', label:'מספרה',              osmKey:'shop', osmValue:'hairdresser', peak:['afternoon'] },
      { value:'beauty',      label:'קוסמטיקה וטיפוח',    osmKey:'shop', osmValue:'beauty',      peak:['afternoon'] },
      { value:'tattoo',      label:'קעקועים ופירסינג',   osmKey:'shop', osmValue:'tattoo',      peak:['afternoon','evening'] }
    ]},
    { label:'בריאות וכושר', items:[
      { value:'gym',        label:'חדר כושר',            osmKey:'leisure', osmValue:'fitness_centre', peak:['morning','evening'] },
      { value:'dentist',    label:'מרפאת שיניים',        osmKey:'amenity', osmValue:'dentist',    peak:['morning','afternoon'] },
      { value:'optician',   label:'אופטיקה',             osmKey:'shop',    osmValue:'optician',   peak:['afternoon'] },
      { value:'veterinary', label:'וטרינר',              osmKey:'amenity', osmValue:'veterinary', peak:['morning','afternoon'] }
    ]},
    { label:'פנאי ותרבות', items:[
      { value:'escape_game', label:'חדר בריחה',          osmKey:'leisure', osmValue:'escape_game', peak:['afternoon','evening'] },
      { value:'games',       label:'משחקים ותחביבים',    osmKey:'shop',    osmValue:'games',       peak:['afternoon','evening'] }
    ]},
    { label:'שירותים ומקצועות', items:[
      { value:'laundry',       label:'מכבסה',              osmKey:'shop', osmValue:'laundry',       peak:['morning','afternoon'] },
      { value:'travel_agency', label:'סוכנות נסיעות',      osmKey:'shop', osmValue:'travel_agency', peak:['afternoon'] },
      { value:'copyshop',      label:'בית דפוס והדפסות',   osmKey:'shop', osmValue:'copyshop',      peak:['morning','afternoon'] }
    ]},
    { label:'ילדים ומשפחה', items:[
      { value:'toys',           label:'חנות צעצועים',      osmKey:'shop',    osmValue:'toys',           peak:['afternoon','evening'] },
      { value:'driving_school', label:'בית ספר לנהיגה',    osmKey:'amenity', osmValue:'driving_school', peak:['afternoon','evening'] }
    ]}
  ];
  var BUSINESS_TYPES = BUSINESS_GROUPS.reduce(function(acc,g){ return acc.concat(g.items); }, []);

  var EXCLUDE_AMENITY = {bench:1,waste_basket:1,parking:1,post_box:1,toilets:1,recycling:1,
    vending_machine:1,atm:1,fountain:1,clock:1,bicycle_parking:1,drinking_water:1,telephone:1,
    fire_hydrant:1,street_lamp:1,parking_entrance:1,parking_space:1,grit_bin:1,give_box:1,bbq:1,
    shelter:1,social_facility:1,place_of_worship:1,grave_yard:1,fuel:1,charging_station:1};

  var TIME_LABEL_HE = { morning:'בוקר', afternoon:'צהריים', evening:'ערב' };
  var POWER_MAX = 11;             // max points power centers can contribute to the "quantity" card
  var SINGLE_ANCHOR_CAP = 0.6;    // one anchor alone can't exceed this share of POWER_MAX

  // Urban Power Center definitions. match() tests OSM tags; radius/weight set intensity.
  var POWER_CENTER_DEFS = [
    { id:'hospital',   intensity:'high',   weight:1.0, radius:1500, label:'בית חולים',
      peak:['morning','afternoon','evening'], match:function(t){ return t.amenity==='hospital'; } },
    { id:'university', intensity:'high',   weight:1.0, radius:1500, label:'קמפוס אקדמי',
      peak:['morning','afternoon'], match:function(t){ return t.amenity==='university' || t.amenity==='college'; } },
    { id:'station',    intensity:'high',   weight:1.0, radius:1500, label:'תחנת רכבת',
      peak:['morning','evening'], match:function(t){ return t.railway==='station'; } },
    { id:'mall',       intensity:'high',   weight:1.0, radius:1500, label:'קניון / מרכז מסחרי',
      peak:['afternoon','evening'], match:function(t){ return t.shop==='mall' || t.shop==='department_store'; } },
    { id:'culture',    intensity:'high',   weight:1.0, radius:1500, label:'מוקד תרבות',
      peak:['afternoon','evening'], match:function(t){ return t.tourism==='attraction' || t.tourism==='museum' || t.amenity==='theatre' || t.amenity==='arts_centre'; } },
    { id:'school',     intensity:'medium', weight:0.5, radius:700,  label:'בית ספר / גן',
      peak:['morning','afternoon'], match:function(t){ return t.amenity==='school' || t.amenity==='kindergarten'; } },
    { id:'park',       intensity:'medium', weight:0.5, radius:700,  label:'פארק',
      peak:['afternoon','evening'], match:function(t){ return t.leisure==='park'; } },
    { id:'gym_anchor', intensity:'medium', weight:0.5, radius:700,  label:'חדר כושר',
      peak:['morning','evening'], match:function(t){ return t.leisure==='fitness_centre'; } },
    { id:'public',     intensity:'medium', weight:0.5, radius:700,  label:'מוסד ציבורי',
      peak:['morning','afternoon'], match:function(t){ return ['townhall','library','community_centre','post_office'].indexOf(t.amenity)>-1; } },
    { id:'supermarket_anchor', intensity:'medium', weight:0.5, radius:700, label:'סופרמרקט',
      peak:['afternoon','evening'], match:function(t){ return t.shop==='supermarket'; } }
  ];
  var OFFICE_CLUSTER_DEF = { id:'office_cluster', intensity:'high', weight:1.0, radius:1500, label:'מקבץ משרדים', peak:['morning','afternoon'] };

  // ---------- Tel Aviv municipal GIS enrichment (works only inside Tel Aviv-Yafo; degrades silently elsewhere) ----------
  var TLV_LANDUSE_LAYER = 514;
  var TLV_NIGHTLIFE_LAYER = 575;
  var TLV_BIKE_LAYER = 577;
  var TLV_WALK_STREETS_LAYER = 659;
  var TLV_PERMITS_LAYER = 772;
  var TLV_REDLINE_LAYER = 766; // "הקו האדום - תחנות" - the only light-rail line currently operating

  var TLV_LANDUSE_TEXT = {
    'מגורים': 'מאופיין בעיקר במגורים - תומך בעסקים שכונתיים, פחות בפעילות ערב אינטנסיבית.',
    'מסחר': 'מיועד בעיקרו למסחר, עם תשתית קמעונאית מבוססת התומכת בתנועת קונים.',
    'תעסוקה': 'אזור תעסוקה מובהק - תנועה חזקה ביום, דעיכה משמעותית בערב.',
    'מגורים-תעסוקה מעורב': 'שימוש מעורב מגורים-תעסוקה - התמהיל התומך ביותר לרוב סוגי העסקים לאורך היום.',
    'מלונאות/תיירות': 'מיועד למלונאות ותיירות - פוטנציאל תנועת מבקרים לצד התושבים הקבועים.'
  };
  var TLV_NIGHTLIFE_TAG = 'אזור בילוי מוגדר';

  var TLV_PERMIT_ACTIVE = { 'בבניה':1, 'קיים היתר':1 };
  var TLV_PERMIT_PIPELINE = { 'בתהליך היתר':1 };
  var TLV_PERMIT_DONE = { 'קיימת לפחות תעודת גמר אחת':1, 'קיים אכלוס':1 };
  // maturity order for de-duplicating a building's permit history down to its most advanced stage
  var TLV_PERMIT_STAGE_ORDER = ['בתהליך היתר','קיים היתר','בבניה','קיימת לפחות תעודת גמר אחת','קיים אכלוס'];

  // ---------- helpers ----------
  function haversine(lat1,lon1,lat2,lon2){
    var R=6371000, toRad=function(d){return d*Math.PI/180;};
    var dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
    var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
      Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)*Math.sin(dLon/2);
    var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    return R*c;
  }
  function clamp(n,min,max){ return Math.max(min,Math.min(max,n)); }
  function scoreColor(score){
    if(score<40) return 'var(--weak)';
    if(score<70) return 'var(--mid)';
    return 'var(--strong)';
  }
  function scoreLevelWord(score){
    if(score<40) return 'חלש';
    if(score<70) return 'בינוני';
    return 'חזק';
  }

  // detects office clusters: a point counts as a cluster core if >=5 office
  // points (itself included) sit within 150m of it; then greedily de-duplicates
  // overlapping cores into distinct cluster anchors.
  function detectOfficeClusters(officePoints){
    var withCounts = officePoints.map(function(p){
      var count = 0;
      officePoints.forEach(function(q){ if(haversine(p.lat,p.lon,q.lat,q.lon)<=150) count++; });
      return { p:p, neighbors:count };
    });
    var qualifying = withCounts.filter(function(o){ return o.neighbors>=5; })
      .sort(function(a,b){ return a.p.dist-b.p.dist; });
    var chosen = [];
    qualifying.forEach(function(o){
      var tooClose = chosen.some(function(c){ return haversine(c.p.lat,c.p.lon,o.p.lat,o.p.lon)<=150; });
      if(!tooClose) chosen.push(o);
    });
    return chosen.map(function(o){ return { lat:o.p.lat, lon:o.p.lon, dist:o.p.dist, size:o.neighbors }; });
  }


  // ---------- data fetching ----------
  function fetchWithTimeout(url, options, timeoutMs){
    options = options || {};
    var controller = new AbortController();
    var externalSignal = options.signal;
    if(externalSignal){
      if(externalSignal.aborted) controller.abort();
      else externalSignal.addEventListener('abort', function(){ controller.abort(); });
    }
    var timer = setTimeout(function(){ controller.abort(); }, timeoutMs);
    var opts = {};
    for(var k in options){ opts[k] = options[k]; }
    opts.signal = controller.signal;
    return fetch(url, opts).finally(function(){ clearTimeout(timer); });
  }

  function geocode(query){
    var url = '/api/geocode?limit=1&q=' + encodeURIComponent(query);
    return fetchWithTimeout(url, {}, 12000).then(function(res){
      return res.text().then(function(text){
        if(!res.ok) throw new Error('שרת המיקום החזיר שגיאה (קוד ' + res.status + ').');
        var data;
        try{ data = JSON.parse(text); }
        catch(e){ throw new Error('תשובה לא תקינה משרת המיקום.'); }
        if(!data || !data.length) return null;
        return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), label: data[0].display_name };
      });
    }).catch(function(err){
      if(err && err.name==='AbortError') throw new Error('איתור הכתובת נמשך יותר מדי זמן. נסה שוב.');
      if(err instanceof TypeError) throw new Error('לא ניתן להגיע לשרת המקומי. ודא שהשרת (proxy_server.py) עדיין רץ בטרמינל.');
      throw err;
    });
  }

  function fetchSuggestions(query, signal){
    var url = '/api/geocode?limit=5&q=' + encodeURIComponent(query);
    return fetchWithTimeout(url, { signal: signal }, 8000).then(function(res){
      if(!res.ok) throw new Error('network');
      return res.json();
    }).then(function(data){
      return (data||[]).map(function(d){
        return { label:d.display_name, lat:parseFloat(d.lat), lon:parseFloat(d.lon) };
      });
    });
  }

  // Fetches one Tel Aviv GIS layer. Always resolves (never rejects) - on any
  // failure (network, non-Tel-Aviv location, server error) it resolves to an
  // empty array, so this enrichment degrades silently everywhere else.
  function fetchTelAvivLayer(layerId, lat, lon, distanceMeters, wantGeometry){
    var url = '/api/telaviv-gis/' + layerId + '?lat=' + encodeURIComponent(lat) + '&lon=' + encodeURIComponent(lon)
      + (distanceMeters ? ('&distance=' + distanceMeters) : '')
      + (wantGeometry ? '&geometry=1' : '');
    return fetchWithTimeout(url, {}, 15000).then(function(res){
      return res.text().then(function(text){
        if(!res.ok) return [];
        try{
          var json = JSON.parse(text);
          return (json && json.features) ? json.features : [];
        } catch(e){ return []; }
      });
    }).catch(function(){ return []; });
  }

  function fetchTelAvivEnrichment(lat, lon){
    return Promise.all([
      fetchTelAvivLayer(TLV_LANDUSE_LAYER, lat, lon, null, false),
      fetchTelAvivLayer(TLV_NIGHTLIFE_LAYER, lat, lon, null, false),
      fetchTelAvivLayer(TLV_BIKE_LAYER, lat, lon, 250, false),
      fetchTelAvivLayer(TLV_WALK_STREETS_LAYER, lat, lon, 80, false),
      fetchTelAvivLayer(TLV_PERMITS_LAYER, lat, lon, 400, false),
      fetchTelAvivLayer(TLV_REDLINE_LAYER, lat, lon, 600, true)
    ]).then(function(results){
      return { landuse:results[0], nightlife:results[1], bike:results[2], walkStreets:results[3], permits:results[4], redline:results[5] };
    });
  }

  // ---------- scoring ----------
  function computeAnalysis(businessType, elements, center, tlv){
    tlv = tlv || {};
    var businesses = [], transit = [], officePoints = [], powerRaw = [];

    elements.forEach(function(el){
      var lat = el.lat != null ? el.lat : (el.center && el.center.lat);
      var lon = el.lon != null ? el.lon : (el.center && el.center.lon);
      if(lat==null || lon==null) return;
      var dist = haversine(center.lat, center.lon, lat, lon);
      if(dist>1500) return;
      var tags = el.tags || {};

      // transit, tagged by mode (used both for the base access score and the diversity bonus)
      if(dist<=800 && (tags.highway==='bus_stop' || tags.public_transport)){
        transit.push({lat:lat,lon:lon,dist:dist,tags:tags,mode:'bus'});
      } else if(dist<=800 && tags.railway==='station'){
        transit.push({lat:lat,lon:lon,dist:dist,tags:tags,mode:'heavy_rail'});
      } else if(dist<=800 && (tags.railway==='tram_stop' || tags.railway==='halt')){
        transit.push({lat:lat,lon:lon,dist:dist,tags:tags,mode:'other_rail'});
      }

      // office points aggregated separately for cluster detection
      if(tags.office && dist<=1500){
        officePoints.push({lat:lat,lon:lon,dist:dist});
        return;
      }

      // power-center tag match (own radius per definition, independent of the 800m business bucket)
      var matchedDef = null;
      for(var i=0;i<POWER_CENTER_DEFS.length;i++){
        var def = POWER_CENTER_DEFS[i];
        if(dist<=def.radius && def.match(tags)){ matchedDef = def; break; }
      }
      var isSelfCompetitor = !!(matchedDef && tags[businessType.osmKey]===businessType.osmValue);
      if(matchedDef && !isSelfCompetitor){
        powerRaw.push({lat:lat,lon:lon,dist:dist,def:matchedDef,tags:tags});
      }

      // local business density bucket - unchanged 800m logic, skipped if already
      // represented as a (non-competitor) power center to avoid double counting
      if(dist<=800){
        if(matchedDef && !isSelfCompetitor) return;
        if(tags.shop && !EXCLUDE_AMENITY[tags.shop]){
          businesses.push({lat:lat,lon:lon,dist:dist,matchKey:'shop',matchValue:tags.shop,tags:tags});
        } else if(tags.amenity && !EXCLUDE_AMENITY[tags.amenity]){
          businesses.push({lat:lat,lon:lon,dist:dist,matchKey:'amenity',matchValue:tags.amenity,tags:tags});
        } else if(tags.leisure==='fitness_centre' || tags.leisure==='escape_game'){
          businesses.push({lat:lat,lon:lon,dist:dist,matchKey:'leisure',matchValue:tags.leisure,tags:tags});
        }
      }
    });

    detectOfficeClusters(officePoints).forEach(function(c){
      powerRaw.push({lat:c.lat, lon:c.lon, dist:c.dist, def:OFFICE_CLUSTER_DEF, tags:{}, size:c.size});
    });

    function isCompetitor(b){ return b.matchKey===businessType.osmKey && b.matchValue===businessType.osmValue; }

    var within400 = businesses.filter(function(b){ return b.dist<=400; });
    var competitors400 = within400.filter(isCompetitor);
    var competitors800 = businesses.filter(isCompetitor);
    var cafesRestaurantsNearby = within400.filter(function(b){
      return b.matchKey==='amenity' && ['cafe','restaurant','bar','fast_food'].indexOf(b.matchValue)>-1;
    }).length;

    // ============ CARD: כמה תנועה יש כאן (quantity, 0-29 = density 18 + power centers 11) ============
    var density = within400.length;
    var densityScore = Math.min(density/25,1)*14;
    densityScore += Math.min(cafesRestaurantsNearby/6,1)*4;
    densityScore = Math.min(densityScore,18);

    var singleCap = POWER_MAX*SINGLE_ANCHOR_CAP;
    var powerContribs = powerRaw.map(function(a){
      var pull = a.def.weight*Math.max(0, 1-a.dist/a.def.radius);
      return { anchor:a, pull:pull, points:Math.min(pull*POWER_MAX, singleCap) };
    });
    var powerScore = clamp(powerContribs.reduce(function(s,c){return s+c.points;},0), 0, POWER_MAX);
    var quantityScore = clamp(densityScore+powerScore, 0, 29);
    var quantityDisp = Math.round(quantityScore/29*100);

    var topPower = powerContribs.slice().sort(function(a,b){return b.points-a.points;})[0];
    var capEngaged = powerContribs.some(function(c){ return (c.pull*POWER_MAX) > singleCap+0.01; });
    var quantityText = density + (density===1?' עסק פעיל נמצא':' עסקים פעילים נמצאו') +
      ' ברדיוס 400 מטר — ' + (quantityDisp<40?'תנועה נמוכה יחסית.':quantityDisp<70?'תנועה סבירה.':'תנועה גבוהה.');
    if(topPower){
      quantityText += ' בנוסף, ' + topPower.anchor.def.label + ' במרחק כ-' + Math.round(topPower.anchor.dist) + ' מטר תורם/ת למשיכת מבקרים נוספת.';
    }
    var breakdownQuantity = 'צפיפות עסקים: ' + (Math.round(densityScore*10)/10) + '/18 · מוקדי משיכה: ' + (Math.round(powerScore*10)/10) + '/11' +
      (capEngaged ? ' (מוגבל ע״י תקרת השפעה למוקד בודד)' : '');

    // ============ CARD: האם זה התזמון הנכון בשבילך (timing, 0-8) ============
    var timeBuckets = { morning:0, afternoon:0, evening:0 };
    powerContribs.forEach(function(c){
      (c.anchor.def.peak||[]).forEach(function(t){ timeBuckets[t] += c.pull; });
    });
    var timeNorm = {};
    ['morning','afternoon','evening'].forEach(function(t){ timeNorm[t] = Math.min(timeBuckets[t]/2,1); });

    // nightlife-policy cap: only applies where we have confirmed Tel Aviv coverage
    // (land-use data present) and the area is NOT designated for nightlife - never
    // penalizes addresses outside Tel Aviv, where we simply have no data either way.
    var nightlifeCapped = false;
    var hasConfirmedCoverage = !!(tlv.landuse && tlv.landuse.length);
    var isNightlifeZone = !!(tlv.nightlife && tlv.nightlife.length);
    if(hasConfirmedCoverage && !isNightlifeZone && timeNorm.evening>0.5){
      timeNorm.evening = 0.5;
      nightlifeCapped = true;
    }

    var relevantTimes = (businessType.peak||[]).map(function(t){ return timeNorm[t]||0; });
    var avgRelevant = relevantTimes.length ? relevantTimes.reduce(function(s,v){return s+v;},0)/relevantTimes.length : 0;
    var timeScore = Math.round(avgRelevant*8);
    var timeDisp = Math.round(timeScore/8*100);

    var TIMES = ['morning','afternoon','evening'];
    function timeListHe(times){
      var arr = TIMES.filter(function(t){ return times.indexOf(t)>-1; }).map(function(t){ return TIME_LABEL_HE[t]; });
      if(arr.length<=1) return arr[0]||'';
      if(arr.length===2) return arr[0]+' ו'+arr[1];
      return arr[0]+', '+arr[1]+' ו'+arr[2];
    }
    function anchorLabelsFor(times){
      var byLabel = {};
      powerContribs.forEach(function(c){
        var overlaps = (c.anchor.def.peak||[]).some(function(t){ return times.indexOf(t)>-1; });
        if(!overlaps) return;
        var lbl = c.anchor.def.label;
        if(!byLabel[lbl] || c.pull>byLabel[lbl].pull) byLabel[lbl] = { pull:c.pull, dist:c.anchor.dist };
      });
      var sorted = Object.keys(byLabel).sort(function(a,b){ return byLabel[b].pull-byLabel[a].pull; }).slice(0,2);
      function withDist(lbl){ return lbl + ' (כ-' + Math.round(byLabel[lbl].dist) + ' מ׳)'; }
      if(sorted.length<=1) return sorted[0] ? withDist(sorted[0]) : '';
      return withDist(sorted[0])+' ו'+withDist(sorted[1]);
    }

    var needed = businessType.peak||[];
    var strong = TIMES.filter(function(t){ return timeNorm[t]>=0.6; });
    var limited = TIMES.filter(function(t){ return timeNorm[t]<0.3; });
    var neededStrong = needed.filter(function(t){ return strong.indexOf(t)>-1; });
    var neededLimited = needed.filter(function(t){ return limited.indexOf(t)>-1; });

    var needsEvening = needed.indexOf('evening')>-1;
    var timeText;
    if(!powerRaw.length){
      timeText = 'אין מספיק מוקדי משיכה בסביבה כדי לאפיין את קצב הפעילות לפי שעות היום.';
    } else if(neededStrong.length){
      timeText = 'פעילות ' + timeListHe(neededStrong) + ' חזקה בזכות ' + anchorLabelsFor(neededStrong) + ' - מתאים לשעות הפעילות של ' + businessType.label + '.';
    } else if(nightlifeCapped && needsEvening){
      timeText = businessType.label + ' זקוק לפעילות ערב, אך האזור אינו מוגדר כאזור בילוי לפי מדיניות הלילה של העירייה - מה שמצמצם את הפוטנציאל גם אם יש תנועה כללית בסביבה.';
    } else if(neededLimited.length){
      timeText = 'השעות המרכזיות ל' + businessType.label + ' (' + timeListHe(neededLimited) + ') דווקא חלשות יחסית באזור זה.';
    } else {
      timeText = 'קצב הפעילות באזור מאוזן יחסית, בלי שעת שיא בולטת אחת.';
    }
    var breakdownTiming = 'ציון התאמת שעות: ' + timeScore + '/8 · בוקר: ' + Math.round(timeNorm.morning*100) + '% · צהריים: ' + Math.round(timeNorm.afternoon*100) + '% · ערב: ' + Math.round(timeNorm.evening*100) + '%' +
      (nightlifeCapped ? ' (פוטנציאל הערב מוגבל ל-50% - האזור אינו מוגדר כאזור בילוי לפי מדיניות הלילה של העירייה)' : '');

    var timeInsight = null;
    if(powerRaw.length){
      if(neededStrong.length){
        timeInsight = 'פעילות ' + timeListHe(neededStrong) + ' חזקה בזכות ' + anchorLabelsFor(neededStrong) +
          ' בסביבה הופכת את המיקום למתאים ל' + businessType.label;
        timeInsight += neededLimited.length ? (', אך פוטנציאל ' + timeListHe(neededLimited) + ' מוגבל.') : '.';
      } else if(neededLimited.length){
        timeInsight = 'פוטנציאל ' + timeListHe(neededLimited) + ' - השעות המרכזיות ל' + businessType.label + ' - מוגבל באזור זה';
        timeInsight += strong.length ? (', לעומת פעילות ' + timeListHe(strong) + ' חזקה יותר בזכות ' + anchorLabelsFor(strong) + ', שמתאימה יותר לעסקים אחרים.') : '.';
      }
    }

    // ============ CARD: כמה קל להגיע (access, 0-33 = base 24 + count 6 + mode-diversity 3) ============
    var busStops = transit.filter(function(t){ return t.mode==='bus'; });
    var heavyRail = transit.filter(function(t){ return t.mode==='heavy_rail'; });
    var otherRail = transit.filter(function(t){ return t.mode==='other_rail'; });
    var redlineDists = (tlv.redline||[]).map(function(f){
      var g = f.geometry;
      if(!g || g.x==null || g.y==null) return null;
      return haversine(center.lat, center.lon, g.y, g.x);
    }).filter(function(d){ return d!=null; });
    var nearestRedline = redlineDists.length ? Math.min.apply(null, redlineDists) : null;
    var redlineNearby = nearestRedline!=null;
    var softMobility = !!((tlv.bike && tlv.bike.length) || (tlv.walkStreets && tlv.walkStreets.length));

    var nearestTransitDist = transit.length ? Math.min.apply(null, transit.map(function(t){return t.dist;})) : null;
    var accessBase = (nearestTransitDist!=null) ? Math.max(0, 1-nearestTransitDist/800)*24 : 4;
    var accessCountBonus = Math.min(transit.length/5,1)*6;
    var modesPresent = 0;
    if(busStops.length) modesPresent++;
    if(heavyRail.length || otherRail.length) modesPresent++;
    if(redlineNearby) modesPresent++;
    if(softMobility) modesPresent++;
    var diversityBonus = Math.min(modesPresent,3);

    var access = clamp(accessBase+accessCountBonus+diversityBonus, 0, 33);
    var accessDisp = Math.round(access/33*100);

    var accessParts = [
      busStops.length ? (busStops.length + (busStops.length===1?' תחנת אוטובוס':' תחנות אוטובוס') + ' ברדיוס 400 מ׳') : 'אין תחנת אוטובוס ברדיוס 400 מ׳',
      (heavyRail.length||otherRail.length) ? 'תחנת רכבת בסביבה' : null,
      redlineNearby ? ('רכבת קלה (קו אדום) במרחק כ-' + Math.round(nearestRedline) + ' מ׳') : null,
      softMobility ? 'תשתית הליכה ואופניים נוחה' : null
    ];
    var accessText = accessParts.filter(function(x){return x;}).join(' · ') + '.';
    var breakdownAccess = 'מרחק לתחנה קרובה: ' + (nearestTransitDist!=null ? (Math.round(nearestTransitDist)+' מ׳') : 'לא נמצאה') + ' (עד 24/33) · ' +
      'כמות נקודות תחבורה: ' + transit.length + ' (עד 6/33) · גיוון אמצעים: ' + modesPresent + ' סוגים (עד 3/33).';

    // ============ CARD: מי כבר כאן (fit, 0-30, unchanged) + competition penalty ============
    var sameCount800 = competitors800.length;
    var fit;
    if(sameCount800===0) fit=22;
    else if(sameCount800<=2) fit=30;
    else if(sameCount800<=5) fit=20;
    else fit=10;
    var penalty = Math.min(competitors400.length*10,32);
    var fitDisp = Math.round(fit/30*100);
    var fitText = sameCount800===0
      ? 'אין כרגע עסקים דומים ברדיוס 800 מטר — פוטנציאל בידול, אך גם ללא אימות ביקוש מקומי.'
      : sameCount800 + (sameCount800===1?' עסק דומה פועל':' עסקים דומים פועלים') + ' כבר באזור, מה שמעיד על ' + (sameCount800<=2?'ביקוש מוכח בלי רוויה.':sameCount800<=5?'תמהיל תומך אך תחרותי יותר.':'אזור רווי לסוג עסק זה.');
    var breakdownFit = sameCount800 + ' עסקים דומים ברדיוס 800 מ׳ → ' + Math.round(fit) + '/30 · קנס תחרות (מרדיוס 400 מ׳ בלבד): -' + Math.round(penalty) + ' נק׳ מהציון הכולל.';

    var finalScore = clamp(Math.round(quantityScore+timeScore+access+fit-penalty),0,100);

    // ============ smart summary, now over 4 factors ============
    var factorMap = { quantity:quantityDisp, timing:timeDisp, access:accessDisp, fit:fitDisp };
    var topFactor = 'quantity';
    Object.keys(factorMap).forEach(function(k){ if(factorMap[k]>factorMap[topFactor]) topFactor=k; });

    var positive;
    if(topFactor==='quantity'){
      positive = 'המיקום נהנה מתנועה ' + (density>=15?'גבוהה':'יציבה') + ' בזכות ' + density + ' עסקים פעילים בסביבה הקרובה';
    } else if(topFactor==='timing'){
      positive = 'המיקום נהנה מתזמון פעילות שתומך היטב בשעות העבודה של ' + businessType.label;
    } else if(topFactor==='access'){
      positive = 'המיקום נהנה מנגישות תחבורתית טובה' + (transit.length? (', עם ' + transit.length + ' נקודות תחבורה ציבורית בטווח הליכה') : '');
    } else {
      positive = 'המיקום נהנה מהתאמה טובה לתמהיל העסקים הקיים באזור';
    }

    var concern;
    if(competitors400.length>0){
      concern = 'אך מתמודד עם ' + competitors400.length + (competitors400.length===1?' מתחרה ישיר':' מתחרים ישירים') + ' ברדיוס 400 מטר';
    } else if(accessDisp<40){
      concern = 'אך הנגישות התחבורתית שלו מוגבלת יחסית';
    } else if(density<5){
      concern = 'אך תנועת הולכי הרגל באזור עדיין מתפתחת';
    } else {
      concern = 'וללא תחרות ישירה משמעותית בסביבה הקרובה';
    }

    var summary = positive + ', ' + concern + '.';
    if(timeInsight) summary += ' ' + timeInsight;

    // ============ TLV tag cards (character, renewal) - Tel Aviv only, never touch the score ============
    var card5 = null;
    if((tlv.landuse && tlv.landuse.length) || (tlv.nightlife && tlv.nightlife.length)){
      var yeud = (tlv.landuse && tlv.landuse.length && tlv.landuse[0].attributes) ? tlv.landuse[0].attributes.t_yeud_rashi : null;
      var landuseKnown = !!(yeud && TLV_LANDUSE_TEXT[yeud]);
      var isNightlife = !!(tlv.nightlife && tlv.nightlife.length);
      var tags5 = [];
      if(landuseKnown) tags5.push(yeud);
      if(isNightlife) tags5.push(TLV_NIGHTLIFE_TAG);
      if(tags5.length){
        var text5 = landuseKnown ? TLV_LANDUSE_TEXT[yeud] : '';
        if(isNightlife) text5 += (text5?' ':'') + 'מוגדר גם כאזור בילוי פעיל על פי מדיניות הלילה של העירייה.';
        card5 = { title:'איזה סוג מקום זה', tags:tags5, text:text5 };
      }
    }

    var card6 = null;
    if(tlv.permits && tlv.permits.length){
      var byBuilding = {};
      tlv.permits.forEach(function(f){
        var a = f.attributes || {};
        var stageIdx = TLV_PERMIT_STAGE_ORDER.indexOf(a.building_stage);
        if(stageIdx<0) return;
        var key = (a.ms_tik_binyan!=null) ? String(a.ms_tik_binyan) : ('r'+Math.random());
        if(!byBuilding[key] || stageIdx > byBuilding[key].stageIdx){
          byBuilding[key] = { stageIdx:stageIdx, tama: !!(a.sw_tama_38 && String(a.sw_tama_38).indexOf('לא')===-1) };
        }
      });
      var buildingsArr = Object.keys(byBuilding).map(function(k){ return byBuilding[k]; });
      if(buildingsArr.length){
        var bPipeline=0, bActive=0, bDone=0, bTama=0;
        buildingsArr.forEach(function(b){
          if(b.stageIdx===0) bPipeline++;
          else if(b.stageIdx===1 || b.stageIdx===2) bActive++;
          else bDone++;
          if(b.tama) bTama++;
        });
        var dominant='pipeline', maxCount=bPipeline;
        if(bActive>=maxCount){ dominant='active'; maxCount=bActive; }
        if(bDone>maxCount){ dominant='done'; maxCount=bDone; }
        var tag6, text6;
        if(dominant==='active'){
          tag6 = 'בעיצומה של התחדשות';
          text6 = buildingsArr.length + (buildingsArr.length===1?' בניין עם פעילות בנייה':' בניינים עם פעילות בנייה') + ' בסביבה הקרובה' + (bTama>0?(', כולל '+bTama+' במסלול תמ״א 38'):'') + '.';
        } else if(dominant==='done'){
          tag6 = 'התחדש לאחרונה';
          text6 = 'רוב הפעילות שנמצאה היא השלמות בנייה שכבר הסתיימו - האזור עבר גל התחדשות לאחרונה.';
        } else {
          tag6 = 'צפוי להתחדש';
          text6 = 'יש בקשות היתר בתהליך בסביבה - סימן מוקדם אפשרי להתחדשות, עוד לפני שהבנייה בפועל התחילה.';
        }
        card6 = { title:'לאן זה הולך', tags:[tag6], text:text6 };
      }
    }

    return {
      score: finalScore,
      factors: {
        quantity: { score:quantityDisp, title:'כמה תנועה יש כאן',            text:quantityText },
        timing:   { score:timeDisp,     title:'האם זה התזמון הנכון בשבילך', text:timeText },
        access:   { score:accessDisp,   title:'כמה קל להגיע',               text:accessText },
        fit:      { score:fitDisp,      title:'מי כבר כאן',                 text:fitText }
      },
      breakdown: { quantity:breakdownQuantity, timing:breakdownTiming, access:breakdownAccess, fit:breakdownFit },
      tagCards: { character:card5, renewal:card6 },
      timeProfile: timeNorm,
      summary: summary,
      competitors: competitors400.concat(competitors800.filter(function(b){return b.dist>400;})),
      otherBusinesses: businesses.filter(function(b){ return !isCompetitor(b); }).slice(0,40),
      transit: transit.slice(0,30),
      powerCenters: powerRaw.slice(0,25)
    };
  }

  // ---------- gauge ----------
  function Gauge(props){
    var score = props.score;
    var animated = React.useState(0);
    var av = animated[0], setAv = animated[1];
    React.useEffect(function(){
      var start=null, from=0, to=score, dur=1000;
      function step(ts){
        if(!start) start=ts;
        var p = Math.min((ts-start)/dur,1);
        var eased = 1-Math.pow(1-p,3);
        setAv(Math.round(from+(to-from)*eased));
        if(p<1) requestAnimationFrame(step);
      }
      var raf = requestAnimationFrame(step);
      return function(){ cancelAnimationFrame(raf); };
    }, [score]);

    var r=100, cx=120, cy=120, circumference=2*Math.PI*r;
    var offset = circumference - (circumference*av/100);
    var ticks = [];
    for(var i=0;i<48;i++){
      var angle = (i/48)*360;
      ticks.push(h('g',{key:i, transform:'rotate('+angle+' '+cx+' '+cy+')'},
        h('line',{x1:cx,y1:6,x2:cx,y2: i%4===0?16:12, stroke:'var(--border)', strokeWidth:i%4===0?2:1})
      ));
    }
    var color = scoreColor(av);
    return h('div',{className:'gauge-wrap'},
      h('svg',{viewBox:'0 0 240 240', width:240, height:240},
        h('g',null, ticks),
        h('circle',{cx:cx,cy:cy,r:r, fill:'none', stroke:'var(--panel-2)', strokeWidth:14}),
        h('circle',{cx:cx,cy:cy,r:r, fill:'none', stroke:color, strokeWidth:14, strokeLinecap:'round',
          strokeDasharray: circumference+' '+circumference, strokeDashoffset:offset,
          transform:'rotate(-90 '+cx+' '+cy+')', style:{transition:'stroke .3s ease'}})
      ),
      h('div',{className:'gauge-center'},
        h('div',{className:'num', style:{color:color}}, av),
        h('div',{className:'lvl', style:{color:color}}, scoreLevelWord(av)),
        h('div',{className:'sub'}, 'ציון פוטנציאל מיקום')
      )
    );
  }

  // ---------- map ----------
  function MapPanel(props){
    var results = props.results;
    var elRef = React.useRef(null);

    React.useEffect(function(){
      if(!results || !elRef.current) return;
      var map = L.map(elRef.current, { zoomControl:true, attributionControl:true }).setView([results.center.lat, results.center.lon], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom:19, attribution:'&copy; OpenStreetMap contributors'
      }).addTo(map);

      L.circle([results.center.lat, results.center.lon], { radius:400, color:'#FFB020', weight:1.5, fillOpacity:0.05, dashArray:'4 4' }).addTo(map);
      L.circle([results.center.lat, results.center.lon], { radius:800, color:'#8B92A0', weight:1, fillOpacity:0.02, dashArray:'2 6' }).addTo(map);

      function dotIcon(color,size){
        return L.divIcon({ className:'', iconSize:[size,size], iconAnchor:[size/2,size/2],
          html:'<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+';box-shadow:0 0 0 3px rgba(0,0,0,.35),0 0 8px '+color+'88;"></div>' });
      }
      function sqIcon(color,size){
        return L.divIcon({ className:'', iconSize:[size,size], iconAnchor:[size/2,size/2],
          html:'<div style="width:'+size+'px;height:'+size+'px;border-radius:3px;background:'+color+';box-shadow:0 0 0 3px rgba(0,0,0,.35),0 0 8px '+color+'88;"></div>' });
      }
      function diamondIcon(color,size){
        return L.divIcon({ className:'', iconSize:[size,size], iconAnchor:[size/2,size/2],
          html:'<div style="width:'+size+'px;height:'+size+'px;background:'+color+';transform:rotate(45deg);box-shadow:0 0 0 3px rgba(0,0,0,.35),0 0 8px '+color+'99;"></div>' });
      }

      L.marker([results.center.lat, results.center.lon], { icon: dotIcon('#FFB020',20) })
        .bindPopup('המיקום שנבחר').addTo(map);

      results.competitors.forEach(function(c){
        L.marker([c.lat,c.lon], { icon: dotIcon('#E5484D',12) })
          .bindPopup('מתחרה: ' + (c.matchValue||'')).addTo(map);
      });
      results.otherBusinesses.forEach(function(b){
        L.marker([b.lat,b.lon], { icon: dotIcon('#8B92A0',8) })
          .bindPopup(b.matchValue||'עסק').addTo(map);
      });
      results.transit.forEach(function(t){
        L.marker([t.lat,t.lon], { icon: sqIcon('#4C8DFF',10) })
          .bindPopup('תחבורה ציבורית').addTo(map);
      });
      (results.powerCenters||[]).forEach(function(p){
        var size = p.def.intensity==='high' ? 16 : 11;
        var peakHe = (p.def.peak||[]).map(function(t){ return TIME_LABEL_HE[t]; }).join(', ');
        var popup = p.def.label + '<br>כ-' + Math.round(p.dist) + ' מטר · עצימות ' +
          (p.def.intensity==='high'?'גבוהה':'בינונית') + '<br>שעות שיא: ' + peakHe;
        L.marker([p.lat,p.lon], { icon: diamondIcon('#A78BFA',size) })
          .bindPopup(popup).addTo(map);
      });

      return function(){ map.remove(); };
    }, [results]);

    return h('div',{className:'panel map-panel'},
      h('div',{className:'map-head'},
        h('h3',null,'מפת הסביבה'),
        h('div',{className:'legend'},
          h('span',null, h('span',{className:'dot',style:{background:'#FFB020'}}), 'המיקום שלך'),
          h('span',null, h('span',{className:'dot',style:{background:'#E5484D'}}), 'מתחרים'),
          h('span',null, h('span',{className:'dot',style:{background:'#8B92A0'}}), 'עסקים אחרים'),
          h('span',null, h('span',{className:'sq',style:{background:'#4C8DFF'}}), 'תחבורה ציבורית'),
          h('span',null, h('span',{className:'dot',style:{background:'#A78BFA'}}), 'מוקדי משיכה')
        )
      ),
      h('div',{id:'map', ref:elRef})
    );

  // ---------- app ----------
  function App(){
    var addressState = React.useState('');
    var address = addressState[0], setAddress = addressState[1];
    var typeState = React.useState(BUSINESS_TYPES[0].value);
    var businessTypeValue = typeState[0], setBusinessTypeValue = typeState[1];
    var loadingState = React.useState(false);
    var loading = loadingState[0], setLoading = loadingState[1];
    var stageState = React.useState('');
    var stage = stageState[0], setStage = stageState[1];
    var errorState = React.useState(null);
    var error = errorState[0], setError = errorState[1];
    var resultsState = React.useState(null);
    var results = resultsState[0], setResults = resultsState[1];
    var showBreakdownState = React.useState(false);
    var showBreakdown = showBreakdownState[0], setShowBreakdown = showBreakdownState[1];
    var suggestionsState = React.useState([]);
    var suggestions = suggestionsState[0], setSuggestions = suggestionsState[1];
    var showSuggState = React.useState(false);
    var showSuggestions = showSuggState[0], setShowSuggestions = showSuggState[1];
    var highlightState = React.useState(-1);
    var highlightIndex = highlightState[0], setHighlightIndex = highlightState[1];
    var selectedGeoState = React.useState(null);
    var selectedGeo = selectedGeoState[0], setSelectedGeo = selectedGeoState[1];
    var debounceRef = React.useRef(null);
    var abortRef = React.useRef(null);

    var businessType = BUSINESS_TYPES.filter(function(b){return b.value===businessTypeValue;})[0];

    function handleAddressChange(e){
      var val = e.target.value;
      setAddress(val);
      setSelectedGeo(null);
      if(debounceRef.current) clearTimeout(debounceRef.current);
      if(abortRef.current) abortRef.current.abort();
      if(val.trim().length < 3){ setSuggestions([]); setShowSuggestions(false); return; }
      debounceRef.current = setTimeout(function(){
        var controller = new AbortController();
        abortRef.current = controller;
        fetchSuggestions(val, controller.signal).then(function(list){
          setSuggestions(list);
          setShowSuggestions(true);
          setHighlightIndex(-1);
        }).catch(function(err){
          if(err.name !== 'AbortError'){ setSuggestions([]); }
        });
      }, 400);
    }

    function selectSuggestion(s){
      setAddress(s.label);
      setSelectedGeo(s);
      setSuggestions([]);
      setShowSuggestions(false);
      setHighlightIndex(-1);
    }

    function handleAddressKeyDown(e){
      if(showSuggestions && suggestions.length){
        if(e.key==='ArrowDown'){ e.preventDefault(); setHighlightIndex(function(i){return Math.min(i+1, suggestions.length-1);}); return; }
        if(e.key==='ArrowUp'){ e.preventDefault(); setHighlightIndex(function(i){return Math.max(i-1,0);}); return; }
        if(e.key==='Enter'){
          e.preventDefault();
          if(highlightIndex>=0 && suggestions[highlightIndex]){ selectSuggestion(suggestions[highlightIndex]); }
          else { setShowSuggestions(false); handleAnalyze(); }
          return;
        }
        if(e.key==='Escape'){ setShowSuggestions(false); return; }
      } else if(e.key==='Enter'){
        handleAnalyze();
      }
    }

    function handleAddressBlur(){
      setTimeout(function(){ setShowSuggestions(false); }, 150);
    }

    function handleAnalyze(){
      setError(null);
      if(!address.trim()){ setError('נא להזין כתובת.'); return; }
      setShowSuggestions(false);
      setResults(null);
      setShowBreakdown(false);
      setLoading(true);
      var geoPromise;
      if(selectedGeo && selectedGeo.label===address){
        setStage('סורק עסקים ותחבורה בסביבה…');
        geoPromise = Promise.resolve(selectedGeo);
      } else {
        setStage('מאתר את הכתובת…');
        geoPromise = geocode(address);
      }
      geoPromise.then(function(geo){
        if(!geo){ throw new Error('לא נמצאה כתובת מתאימה. נסה לנסח אותה בצורה מדויקת יותר (רחוב, מספר, עיר).'); }
        setStage('סורק עסקים ותחבורה בסביבה…');
        return Promise.all([
          fetchOverpass(geo.lat, geo.lon),
          fetchTelAvivEnrichment(geo.lat, geo.lon)
        ]).then(function(pair){
          var elements = pair[0], tlv = pair[1];
          setStage('מחשב ציון…');
          var analysis = computeAnalysis(businessType, elements, geo, tlv);
          analysis.center = geo;
          analysis.addressLabel = geo.label;
          setResults(analysis);
        });
      }).catch(function(err){
        setError(err && err.message ? err.message : 'משהו השתבש. נסה שוב.');
      }).finally(function(){
        setLoading(false); setStage('');
      });
    }

    return h('div',{className:'shell'},
      h('div',{className:'brand'},
        h('div',{className:'wordmark'}, 'BRILLIANT CORNERS'),
        h('h1',null,'ניתוח בהיר למסחר בעיר'),
        h('p',null,'הזן כתובת וסוג עסק, וקבל חוות דעת ברורה על פוטנציאל ההצלחה של המיקום.')
      ),

      h('div',{className:'panel input-panel'},
        h('div',{className:'field'},
          h('label',null,'כתובת'),
          h('div',{className:'addr-field-wrap'},
            h('input',{
              type:'text', placeholder:'לדוגמה: דיזנגוף 225, תל אביב', autoComplete:'off',
              value:address, onChange:handleAddressChange,
              onKeyDown:handleAddressKeyDown,
              onFocus:function(){ if(suggestions.length) setShowSuggestions(true); },
              onBlur:handleAddressBlur
            }),
            showSuggestions ? h('div',{className:'suggestions'},
              suggestions.length ? suggestions.map(function(s,i){
                return h('div',{
                  key:i,
                  className:'suggestion-item' + (i===highlightIndex ? ' active' : ''),
                  onMouseDown:function(e){ e.preventDefault(); selectSuggestion(s); },
                  onMouseEnter:function(){ setHighlightIndex(i); }
                },
                  h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},
                    h('path',{d:'M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z'}),
                    h('circle',{cx:12,cy:9,r:2.3})
                  ),
                  h('span',null, s.label)
                );
              }) : h('div',{className:'suggestion-empty'}, 'לא נמצאו הצעות')
            ) : null
          )
        ),
        h('div',{className:'select-wrap field'},
          h('label',null,'סוג עסק'),
          h('div',{className:'select-box'},
            h('select',{ value:businessTypeValue, onChange:function(e){setBusinessTypeValue(e.target.value);} },
              BUSINESS_GROUPS.map(function(g){
                return h('optgroup',{key:g.label, label:g.label},
                  g.items.map(function(bt){ return h('option',{key:bt.value, value:bt.value}, bt.label); })
                );
              })
            )
          )
        ),
        h('div',{className:'field btn-field'},
          h('label',{'aria-hidden':'true'}, '\u00A0'),
          h('button',{className:'analyze-btn', disabled:loading, onClick:handleAnalyze},
            loading ? 'מנתח…' : 'נתח את המיקום'
          )
        )
      ),

      error ? h('div',{className:'error-box'}, error) : null,
      loading ? h('div',{className:'stage'}, h('div',{className:'spinner'}), stage) : null,
      (!results && !loading && !error) ? h('div',{className:'empty-hint'}, 'התוצאה תופיע כאן תוך שניות — ציון, כמה גורמי מפתח ומפת סביבה.') : null,

      results ? h('div',{className:'results'},
        h('div',{className:'panel score-section'},
          h(Gauge,{score:results.score}),
          h('div',{className:'addr-line'}, h('b',null, businessType.label), ' · ', results.addressLabel),
          h('div',{className:'summary-box'}, results.summary),
          h('button',{className:'breakdown-toggle', onClick:function(){ setShowBreakdown(!showBreakdown); }},
            showBreakdown ? 'הסתר את הפירוט' : 'למה הציון הזה?'
          ),
          showBreakdown ? h('div',{className:'breakdown-panel'},
            h('div',{className:'breakdown-row'}, h('b',null,'כמה תנועה יש כאן: '), results.breakdown.quantity),
            h('div',{className:'breakdown-row'}, h('b',null,'התאמת תזמון: '), results.breakdown.timing),
            h('div',{className:'breakdown-row'}, h('b',null,'כמה קל להגיע: '), results.breakdown.access),
            h('div',{className:'breakdown-row'}, h('b',null,'מי כבר כאן: '), results.breakdown.fit)
          ) : null
        ),
        h('div',{className:'factors'},
          h(FactorCard,{factor:results.factors.quantity, icon:'quantity'}),
          h(FactorCard,{factor:results.factors.timing, icon:'timing', timeProfile:results.timeProfile}),
          h(FactorCard,{factor:results.factors.access, icon:'access'}),
          h(FactorCard,{factor:results.factors.fit, icon:'fit'}),
          results.tagCards.character ? h(TagCard,{card:results.tagCards.character, icon:'character'}) : null,
          results.tagCards.renewal ? h(TagCard,{card:results.tagCards.renewal, icon:'renewal'}) : null
        ),
        h(MapPanel,{results:results})
      ) : null,

      h('div',{className:'footer-note'},
        'הציון מבוסס על נתוני מפה פתוחים (OpenStreetMap) ומודל היוריסטי פשוט - כלי עזר להערכה ראשונית, לא תחליף לבדיקת שטח. בתוך גבולות עיריית תל אביב-יפו, הניתוח כולל גם נתוני ייעוד קרקע, מדיניות לילה, הליכתיות והתחדשות עירונית ממקורות GIS עירוניים רשמיים.'
      )
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
})();
</script>
</body>
</html>
